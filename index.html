<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSight - Zambia's Marketplace</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;padding:10px}
.container{max-width:600px;margin:0 auto}
        h1{text-align:center;color:#1877f2;margin:15px 0;font-size:26px}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
        label{display:block;margin:12px 0 4px;font-weight:600;color:#333;font-size:15px}
        input,textarea,select{width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:16px}
        input:focus,textarea:focus,select:focus{outline:none;border-color:#1877f2}
        button{width:100%;padding:14px;background:#1877f2;color:white;border:none;border-radius:8px;font-size:17px;font-weight:600;margin-top:16px;cursor:pointer}
        button:active{background:#166fe5}
        button:disabled{background:#999;cursor:not-allowed}
        #imagePreview{max-width:100%;margin-top:8px;border-radius:8px;display:none}
#productsList{display:grid;grid-template-columns:repeat(2,1fr);gap:4px}
.product{background:white;border-radius:4px;overflow:hidden;cursor:pointer}
.product img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:#eee}
.product-info{padding:6px;background:white}
.product h3{color:#111;font-size:13px;font-weight:600;line-height:1.2;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.price{font-size:15px;font-weight:700;color:#00a400}
.filters{display:flex;gap:8px;overflow-x:auto;padding:8px 0;margin-bottom:12px}
.filter-btn{padding:7px 14px;background:white;border:2px solid #ddd;border-radius:20px;white-space:nowrap;cursor:pointer;font-size:13px;color:#333}
.filter-btn.active{background:#1877f2;color:white;border-color:#1877f2}
        #noProducts{text-align:center;color:#999;padding:40px 0;grid-column:span 2}
        #adminPanel{display:none}
        #loginPanel{display:none;text-align:center}
        #adminBtn{position:fixed;bottom:16px;right:16px;width:auto;padding:9px 14px;font-size:13px;background:#333;z-index:100}
.delete-btn{background:#e41e3f;margin-top:12px;padding:10px;font-size:15px}
.password-wrap{position:relative}
.toggle-pass{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;width:auto;padding:0;margin:0;font-size:18px;cursor:pointer}
.back-btn{background:#666;margin-bottom:16px;padding:12px}
.detail-img{width:100%;max-height:280px;object-fit:contain;border-radius:12px;margin-bottom:12px;background:#f8f8f8}
.detail-price{font-size:26px;font-weight:700;color:#00a400;margin:12px 0}
.detail-desc{background:#f8f8f8;padding:14px;border-radius:8px;margin:12px 0;line-height:1.6;white-space:pre-wrap}
.whatsapp-btn{display:block;text-align:center;background:#25D366;color:white;padding:14px;border-radius:8px;text-decoration:none;font-weight:600;font-size:16px;margin-top:20px}
        #detailsPage{display:none}
        #homePage{display:block}
    </style>
</head>
<body>
    <div class="container">
        <h1>ShopSight Zambia</h1>

        <div id="loginPanel" class="card">
            <h2>Owner Login</h2>
            <div class="password-wrap">
                <input type="password" id="passwordInput" placeholder="Enter password">
                <button type="button" class="toggle-pass" onclick="togglePassword()">👁️</button>
            </div>
            <button onclick="checkPassword()">Login</button>
            <button onclick="cancelLogin()" style="background:#999;margin-top:10px">Cancel</button>
        </div>

        <div id="adminPanel">
            <div class="card">
                <h2>Add New Product</h2>
                <form id="productForm">
                    <label>Product Name</label>
                    <input type="text" id="productName" placeholder="e.g. iPhone 12" required>
                    <label>Description</label>
                    <textarea id="productDesc" rows="4" placeholder="Condition, specs, location, etc" required></textarea>
                    <label>Product Image</label>
                    <input type="file" id="productImage" accept="image/*" required>
                    <img id="imagePreview" alt="Preview">
                    <label>Category</label>
                    <select id="productCategory" required>
                        <option value="">Select category</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Fashion">Fashion</option>
                        <option value="Home & Garden">Home & Garden</option>
                        <option value="Vehicles">Vehicles</option>
                        <option value="Other">Other</option>
                    </select>
                    <label>Price (K)</label>
                    <input type="number" id="productPrice" placeholder="e.g. 2500" min="1" required>
                    <button type="submit" id="submitBtn">Add Product to Store</button>
                </form>
                <button onclick="logout()" style="background:#666;margin-top:10px">Logout</button>
            </div>
        </div>

        <div id="homePage">
            <div class="filters" id="filtersWrap">
                <button class="filter-btn active" data-cat="All">All</button>
                <button class="filter-btn" data-cat="Electronics">Electronics</button>
                <button class="filter-btn" data-cat="Clothing">Clothing</button>
                <button class="filter-btn" data-cat="Houses">Houses</button>
                <button class="filter-btn" data-cat="Vehicles">Vehicles</button>
                <button class="filter-btn" data-cat="Other">Other</button>
            </div>

            <div id="productsList">
                <p id="noProducts">No products found. Check back later!</p>
            </div>
        </div>

        <div id="detailsPage">
            <button class="back-btn" onclick="showHome()">← Back to Products</button>
            <div id="detailContent"></div>
        </div>
    </div>

    <button id="adminBtn" onclick="showLogin()">Owner</button>

    <script>
        const OWNER_PASSWORD = "MARKET2024";
        let products=JSON.parse(localStorage.getItem('shopsight_products'))||[];
        let currentFilter='All';
        let isLoggedIn=sessionStorage.getItem('shopsight_logged')==='true';
        let isSubmitting=false;

        document.querySelectorAll('.filter-btn').forEach(btn=>{
            btn.addEventListener('click',function(){
                filterProducts(this.getAttribute('data-cat'));
            });
        });

        function showLogin(){
            document.getElementById('loginPanel').style.display='block';
            document.getElementById('adminBtn').style.display='none';
            document.getElementById('homePage').style.display='none';
            document.getElementById('detailsPage').style.display='none';
            window.scrollTo(0,0);
        }

        function cancelLogin(){
            document.getElementById('loginPanel').style.display='none';
            document.getElementById('adminBtn').style.display='block';
            document.getElementById('homePage').style.display='block';
            document.getElementById('passwordInput').value='';
        }

        function togglePassword(){
            const input=document.getElementById('passwordInput');
            input.type=input.type==='password'?'text':'password';
        }

        function checkPassword(){
            const pass=document.getElementById('passwordInput').value;
            if(pass===OWNER_PASSWORD){
                sessionStorage.setItem('shopsight_logged','true');
                isLoggedIn=true;
                document.getElementById('loginPanel').style.display='none';
                document.getElementById('adminPanel').style.display='block';
                document.getElementById('homePage').style.display='block';
                document.getElementById('passwordInput').value='';
                displayProducts();
            }else{
                alert('Wrong password');
            }
        }

        function logout(){
            sessionStorage.removeItem('shopsight_logged');
            isLoggedIn=false;
            document.getElementById('adminPanel').style.display='none';
            document.getElementById('adminBtn').style.display='block';
            displayProducts();
        }

        document.getElementById('productImage').addEventListener('change',function(e){
            const file=e.target.files[0];
            if(file){
                const reader=new FileReader();
                reader.onload=function(event){
                    const preview=document.getElementById('imagePreview');
                    preview.src=event.target.result;
                    preview.style.display='block';
                }
                reader.readAsDataURL(file);
            }
        });

        function compressImage(file, callback){
            const reader=new FileReader();
            reader.onload=function(e){
                const img=new Image();
                img.onload=function(){
                    const canvas=document.createElement('canvas');
                    let width=img.width;
                    let height=img.height;
                    const maxSize=800;
                    if(width>height){
                        if(width>maxSize){
                            height=Math.round(height*maxSize/width);
                            width=maxSize;
                        }
                    }else{
                        if(height>maxSize){
                            width=Math.round(width*maxSize/height);
                            height=maxSize;
                        }
                    }
                    canvas.width=width;
                    canvas.height=height;
                    const ctx=canvas.getContext('2d');
                    ctx.drawImage(img,0,0,width,height);
                    callback(canvas.toDataURL('image/jpeg',0.7));
                };
                img.src=e.target.result;
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('productForm').addEventListener('submit',function(e){
            e.preventDefault();
            if(!isLoggedIn||isSubmitting)return;
            const name=document.getElementById('productName').value.trim();
            const desc=document.getElementById('productDesc').value.trim();
            const price=document.getElementById('productPrice').value.trim();
            const category=document.getElementById('productCategory').value;
            const imageInput=document.getElementById('productImage');
            const file=imageInput.files[0];
            if(!file||!name||!desc||!price||!category)return;
            
            isSubmitting=true;
            const submitBtn=document.getElementById('submitBtn');
            submitBtn.disabled=true;
            submitBtn.textContent='Adding...';

            compressImage(file,function(compressedDataUrl){
                const product={
                    id:Date.now(),
                    name:name,
                    desc:desc,
                    price:price,
                    category:category,
                    image:compressedDataUrl,
                    date:new Date().toLocaleDateString()
                };
                products.unshift(product);
                localStorage.setItem('shopsight_products',JSON.stringify(products));
                displayProducts();
                document.getElementById('productForm').reset();
                document.getElementById('imagePreview').style.display='none';
                submitBtn.disabled=false;
                submitBtn.textContent='Add Product to Store';
                isSubmitting=false;
                alert('Product added successfully!');
            });
        });

        function deleteProduct(id){
            if(!isLoggedIn)return;
            if(!confirm('Delete this product?'))return;
            products=products.filter(p=>p.id!==id);
            localStorage.setItem('shopsight_products',JSON.stringify(products));
            showHome();
            displayProducts();
        }

        function viewDetails(id){
            const product=products.find(p=>p.id===id);
            if(!product)return;
            document.getElementById('homePage').style.display='none';
            document.getElementById('detailsPage').style.display='block';
            document.getElementById('adminBtn').style.display='none';
            document.getElementById('detailContent').innerHTML=`
                <div class="card">
                    <img src="${product.image}" class="detail-img" alt="${product.name}">
                    <h2>${product.name}</h2>
                    <div class="detail-price">K${product.price}</div>
                    <p style="color:#666;margin-bottom:10px">${product.category} • Posted ${product.date}</p>
                    <h3>Description</h3>
                    <div class="detail-desc">${product.desc}</div>
                    <a class="whatsapp-btn" href="https://wa.me/260978101177?text=Hi! I'm interested in your ${encodeURIComponent(product.name)} for K${product.price} on ShopSight" target="_blank">
                        Chat on WhatsApp
                    </a>
                    ${isLoggedIn?`<button class="delete-btn" onclick="deleteProduct(${product.id})">Delete Product</button>`:''}
                </div>
            `;
            window.scrollTo(0,0);
        }

        function showHome(){
            document.getElementById('detailsPage').style.display='none';
            document.getElementById('homePage').style.display='block';
            if(!isLoggedIn)document.getElementById('adminBtn').style.display='block';
            window.scrollTo(0,0);
        }

        function displayProducts(){
            const list=document.getElementById('productsList');
            const filtered=currentFilter==='All'?products:products.filter(p=>p.category===currentFilter);
            if(filtered.length===0){
                list.innerHTML='<p id="noProducts">No products found in '+currentFilter+'</p>';
                return;
            }
            list.innerHTML=filtered.map(p=>`
                <div class="product" onclick="viewDetails(${p.id})">
                    <img src="${p.image}" alt="${p.name}">
                    <div class="product-info">
                        <div class="price">K${p.price}</div>
                        <h3>${p.name}</h3>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts(category){
            currentFilter=category;
            document.querySelectorAll('.filter-btn').forEach(btn=>{
                btn.classList.remove('active');
                if(btn.getAttribute('data-cat')===category){
                    btn.classList.add('active');
                }
            });
            displayProducts();
        }

        if(isLoggedIn){
            document.getElementById('adminPanel').style.display='block';
            document.getElementById('adminBtn').style.display='none';
        }
        displayProducts();
    </script>
</body>
</html>
